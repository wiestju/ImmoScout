site_name: immoscout
site_description: Typed, unofficial Python client for ImmobilienScout24 — with a built-in MCP server for AI agents.
site_url: https://wiestju.github.io/ImmoScout/
repo_url: https://github.com/wiestju/ImmoScout
repo_name: wiestju/ImmoScout

theme:
  name: material
  icon:
    logo: material/home-search
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 3
            members_order: source
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User guide: guide.md
  - AI agents (MCP): mcp.md
  - API reference: api.md
